default:
    autoload:
        '': '%paths.base%/../features/bootstrap'
    suites:
        default:
            paths: [ '%paths.base%/../features' ]
            contexts:
             - FeatureContext:
                    parameters:
                        server: "mobile-hub.lambdatest.com"
                        user: "${LT_USERNAME}"
                        key: "${LT_ACCESS_KEY}"
                        capabilities:
                            build: "behat-appium-ios"
                            name: "single-behat-test"
                            isRealMobile: true
                            app: "${IOS_APP_ID}"
                            # autoAcceptAlerts: true,
                            autoGrantPermissions: true
                        environments:
                            -
                                deviceName: "iPhone .*"
                                platform: "ios"
                                platformVersion: "18"


